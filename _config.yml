# Site settings
title: JUnit
email: team@junit.org
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://junit.org" # the base hostname & protocol for your site
current_repo_url: https://github.com/junit-team/junit-framework

# Build settings
markdown: kramdown
sass:
  # Minify the compiled CSS for production.
  style: compressed
  # Silence Dart Sass deprecation warnings emitted by the vendored Bootstrap SCSS.
  quiet_deps: true
  # Bootstrap 5.3 is consumed via @import (it isn't @use-ready yet), so silence that
  # transitional deprecation on our own entry files too.
  silence_deprecations:
    - import
exclude:
  - .github
  - .idea
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
include:
  - _headers
  - _redirects
